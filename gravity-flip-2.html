<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Flip — by Humayun Factoo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080818; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#fff; }
#hud { display:flex; gap:20px; margin-bottom:10px; font-size:13px; color:#aaa; align-items:center; }
#hud span { font-weight:500; color:#fff; }
#muteBtn { font-size:11px; padding:3px 10px; border-radius:99px; background:#1a1a3a; color:#aaa; border:1px solid #333; cursor:pointer; }
canvas { border:1px solid #222; border-radius:12px; touch-action:none; display:block; }
#ctrl { margin-top:10px; font-size:12px; color:#444; text-align:center; }
</style>
</head>
<body>
<div id="hud">
  <div>Score: <span id="sc">0</span></div>
  <div>Best: <span id="bs">0</span></div>
  <button id="muteBtn">🔊 Sound</button>
</div>
<canvas id="c" width="340" height="500"></canvas>
<div id="ctrl">Tap or Space to flip gravity</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = cv.width, H = cv.height;

let muted = false, audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,type,duration,vol,startFreq){if(muted)return;try{const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=type;if(startFreq){o.frequency.setValueAtTime(startFreq,a.currentTime);o.frequency.linearRampToValueAtTime(freq,a.currentTime+duration);}else{o.frequency.setValueAtTime(freq,a.currentTime);}g.gain.setValueAtTime(vol,a.currentTime);o.start(a.currentTime);o.stop(a.currentTime+duration);}catch(e){}}
function playFlip(f){playTone(f?600:300,'sine',0.12,0.3,f?300:600);}
function playDie(){if(muted)return;try{const a=getAudio(),buf=a.createBuffer(1,a.sampleRate*0.4,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const src=a.createBufferSource(),g=a.createGain();src.buffer=buf;src.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.6,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.38);src.start();}catch(e){}
}
function playScore(){playTone(880,'sine',0.08,0.15);}
let bgInterval=null,bgNotes=[130,146,164,174,196,220,246,261],bgIdx=0;
function startBG(){if(bgInterval)return;bgIdx=0;bgInterval=setInterval(()=>{if(muted||state!=='play')return;try{const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.setValueAtTime(bgNotes[bgIdx%bgNotes.length],a.currentTime);g.gain.setValueAtTime(0.02,a.currentTime);o.start(a.currentTime);o.stop(a.currentTime+0.35);bgIdx++;}catch(e){}},220);}
function stopBG(){if(bgInterval){clearInterval(bgInterval);bgInterval=null;}}
document.getElementById('muteBtn').onclick=()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇 Muted':'🔊 Sound';};

let state='splash',frame=0,score=0,best=0,lastScore=-1;
let player,obstacles,particles,stars,nebulas,groundY,ceilY,speed,spawnTimer,shakeTimer=0,shakeAmt=0,flipCooldown=0;
let milestoneAnim=0,milestoneText='';
let splashFrame=0,introPlayer={x:-40,y:H/2,done:false},introBorderFlash=0;
const PSIZE=18,OW=30,GAP=155;

function initStars(){
  stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+0.3,speed:Math.random()*1.2+0.2,alpha:Math.random()*0.7+0.2,pulse:Math.random()*Math.PI*2}));
  nebulas=Array.from({length:5},()=>({x:Math.random()*W,y:Math.random()*H,r:40+Math.random()*60,hue:Math.random()*360,alpha:0.04+Math.random()*0.04}));
}

function init(){
  player={x:80,y:H/2,vy:0,grav:0.55,flipped:false,trail:[],squish:1};
  obstacles=[];particles=[];
  frame=0;score=0;lastScore=-1;speed=3.2;spawnTimer=0;
  shakeTimer=0;shakeAmt=0;flipCooldown=0;milestoneAnim=0;
  groundY=H-20;ceilY=20;
  state='play';startBG();
}

function drawRocket(x,y,flipped,scale,glowCol){
  cx.save();cx.translate(x,y);
  if(flipped)cx.scale(1,-1);
  if(scale)cx.scale(scale,scale);
  cx.shadowColor=glowCol||'#7F77DD';cx.shadowBlur=16;
  cx.beginPath();cx.ellipse(0,0,9,16,0,0,Math.PI*2);
  const rg=cx.createLinearGradient(-9,0,9,0);
  rg.addColorStop(0,'#534AB7');rg.addColorStop(0.5,'#7F77DD');rg.addColorStop(1,'#3C3489');
  cx.fillStyle=rg;cx.fill();cx.strokeStyle='#AFA9EC';cx.lineWidth=1;cx.stroke();cx.shadowBlur=0;
  cx.beginPath();cx.moveTo(-9,4);cx.lineTo(-16,16);cx.lineTo(-3,8);cx.closePath();cx.fillStyle='#D4537E';cx.fill();
  cx.beginPath();cx.moveTo(9,4);cx.lineTo(16,16);cx.lineTo(3,8);cx.closePath();cx.fillStyle='#D4537E';cx.fill();
  cx.beginPath();cx.ellipse(0,-10,5,8,0,0,Math.PI*2);cx.fillStyle='rgba(150,220,255,0.85)';cx.fill();cx.strokeStyle='rgba(200,240,255,0.5)';cx.lineWidth=1;cx.stroke();
  cx.beginPath();cx.ellipse(0,14,5,6,0,0,Math.PI);
  const fg=cx.createRadialGradient(0,14,0,0,14,8);
  fg.addColorStop(0,'#fff');fg.addColorStop(0.3,'#EF9F27');fg.addColorStop(1,'rgba(226,75,74,0)');
  cx.fillStyle=fg;cx.fill();
  cx.restore();
}

function drawSplash(){
  cx.fillStyle='#080818';cx.fillRect(0,0,W,H);
  nebulas.forEach(n=>{
    const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${n.hue},80%,60%,${n.alpha*1.5})`);g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fill();
  });
  stars.forEach(s=>{s.pulse+=0.03;const a=s.alpha*(0.7+0.3*Math.sin(s.pulse));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${a})`;cx.fill();});
  splashFrame++;
  const fade=Math.min(1,splashFrame/60);
  cx.globalAlpha=fade;
  cx.fillStyle='rgba(127,119,221,0.12)';cx.fillRect(0,0,W,H);
  cx.font='500 11px sans-serif';cx.textAlign='center';cx.fillStyle='rgba(93,202,165,0.8)';cx.fillText('PRESENTS',W/2,H/2-130);
  cx.font='500 36px sans-serif';cx.textAlign='center';cx.shadowColor='#7F77DD';cx.shadowBlur=30;
  cx.fillStyle='#fff';cx.fillText('GRAVITY',W/2,H/2-70);
  cx.fillStyle='#5DCAA5';cx.fillText('FLIP',W/2,H/2-30);cx.shadowBlur=0;
  cx.font='400 11px sans-serif';cx.fillStyle='rgba(255,255,255,0.35)';cx.fillText('by Humayun Factoo',W/2,H/2+5);
  const lineY=H/2+40;
  const lineAlpha=Math.max(0,Math.min(1,(splashFrame-40)/40));
  cx.globalAlpha=lineAlpha*fade;
  const pulse=0.6+0.4*Math.sin(splashFrame*0.08);
  cx.strokeStyle=`rgba(93,202,165,${pulse})`;cx.lineWidth=2;cx.setLineDash([8,6]);cx.beginPath();cx.moveTo(20,lineY);cx.lineTo(W-20,lineY);cx.stroke();cx.setLineDash([]);
  if(splashFrame>60){
    if(!introPlayer.done){introPlayer.x+=4;if(introPlayer.x>W/2){introPlayer.done=true;introBorderFlash=30;}}
    const rx=introPlayer.done?W/2:introPlayer.x;
    drawRocket(rx,lineY,false,0.9,'#5DCAA5');
    if(introBorderFlash>0){introBorderFlash--;cx.globalAlpha=(introBorderFlash/30)*lineAlpha;cx.strokeStyle='#fff';cx.lineWidth=3;cx.setLineDash([]);cx.beginPath();cx.moveTo(20,lineY);cx.lineTo(W-20,lineY);cx.stroke();cx.setLineDash([]);}
  }
  cx.globalAlpha=Math.max(0,Math.min(1,(splashFrame-80)/40))*fade;
  const tapPulse=0.5+0.5*Math.sin(splashFrame*0.1);
  cx.fillStyle=`rgba(255,255,255,${tapPulse*0.8})`;cx.font='400 13px sans-serif';cx.textAlign='center';cx.fillText('tap anywhere to play',W/2,H/2+120);
  cx.globalAlpha=1;
}

function flip(){
  if(state==='splash'){if(splashFrame>80){init();}return;}
  if(state==='dead'){init();return;}
  if(flipCooldown>0)return;
  player.flipped=!player.flipped;player.vy=player.flipped?-8:8;player.squish=1.6;flipCooldown=8;
  playFlip(player.flipped);spawnFlipParticles();spawnRingBurst();
}

function spawnFlipParticles(){for(let i=0;i<14;i++)particles.push({type:'dot',x:player.x,y:player.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:35,maxLife:35,color:player.flipped?'#5DCAA5':'#7F77DD',size:3});}
function spawnRingBurst(){particles.push({type:'ring',x:player.x,y:player.y,r:0,maxR:40,life:20,maxLife:20,color:player.flipped?'#5DCAA5':'#7F77DD'});}

function spawnObs(){
  const minH=50,maxH=H-GAP-minH-40,topH=minH+Math.random()*maxH,botY=topH+GAP;
  const hue=Math.random()>0.5?'pink':'purple';
  obstacles.push({x:W+20,topH,botY,botH:H-botY-20,scored:false,hue,glowPhase:Math.random()*Math.PI*2});
}

function shake(amt){shakeTimer=14;shakeAmt=amt;}

function drawBG(){
  cx.fillStyle='#080818';cx.fillRect(0,0,W,H);
  nebulas.forEach(n=>{n.x-=0.15;if(n.x+n.r<0)n.x=W+n.r;const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,`hsla(${n.hue},80%,60%,${n.alpha})`);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fill();});
  stars.forEach(s=>{s.x-=s.speed*(speed/3.2);s.pulse+=0.04;if(s.x<0){s.x=W;s.y=Math.random()*H;}const a=s.alpha*(0.7+0.3*Math.sin(s.pulse));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${a})`;cx.fill();});
  cx.fillStyle='#12122e';cx.fillRect(0,0,W,ceilY);cx.fillRect(0,groundY,W,H-groundY);
  const lg=cx.createLinearGradient(0,0,W,0);lg.addColorStop(0,'#5DCAA5');lg.addColorStop(0.5,'#7F77DD');lg.addColorStop(1,'#5DCAA5');
  cx.fillStyle=lg;cx.fillRect(0,ceilY-2,W,2);cx.fillRect(0,groundY,W,2);
  cx.fillStyle='rgba(93,202,165,0.08)';cx.fillRect(0,ceilY,W,10);cx.fillRect(0,groundY-10,W,10);
}

function drawPlayer(){
  player.trail.push({x:player.x,y:player.y,flipped:player.flipped});
  if(player.trail.length>14)player.trail.shift();
  player.trail.forEach((p,i)=>{const t=i/player.trail.length,alpha=t*0.3;cx.beginPath();cx.arc(p.x,p.y,PSIZE/2*t*0.9,0,Math.PI*2);cx.fillStyle=p.flipped?`rgba(93,202,165,${alpha})`:`rgba(127,119,221,${alpha})`;cx.fill();});
  player.squish+=(1-player.squish)*0.18;
  drawRocket(player.x,player.y,player.flipped,1,player.flipped?'#5DCAA5':'#7F77DD');
}

function drawObs(o){
  o.glowPhase+=0.06;const gi=0.5+0.5*Math.sin(o.glowPhase);
  const col1=o.hue==='pink'?'#D4537E':'#7F77DD',col2=o.hue==='pink'?'#72243E':'#3C3489';
  const glow=o.hue==='pink'?`rgba(212,83,126,${0.3*gi})`:`rgba(127,119,221,${0.3*gi})`;
  const highlight=o.hue==='pink'?'#ED93B1':'#AFA9EC';
  cx.shadowColor=glow;cx.shadowBlur=15;
  const g1=cx.createLinearGradient(o.x,0,o.x+OW,0);g1.addColorStop(0,col1);g1.addColorStop(1,col2);
  cx.fillStyle=g1;cx.beginPath();cx.roundRect(o.x,ceilY,OW,o.topH,[0,0,8,8]);cx.fill();cx.shadowBlur=0;
  cx.fillStyle=highlight;cx.fillRect(o.x+2,ceilY+o.topH-8,OW-4,6);
  cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(o.x+2,ceilY,4,o.topH);
  cx.shadowColor=glow;cx.shadowBlur=15;cx.fillStyle=g1;cx.beginPath();cx.roundRect(o.x,o.botY,OW,o.botH,[8,8,0,0]);cx.fill();cx.shadowBlur=0;
  cx.fillStyle=highlight;cx.fillRect(o.x+2,o.botY+2,OW-4,6);cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(o.x+2,o.botY,4,o.botH);
}

function drawParticles(){
  particles.forEach(p=>{const a=p.life/p.maxLife;
    if(p.type==='ring'){p.r+=p.maxR/p.maxLife*2;p.life--;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.strokeStyle=p.color+Math.floor(a*180).toString(16).padStart(2,'0');cx.lineWidth=2*a;cx.stroke();}
    else{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;cx.beginPath();cx.arc(p.x,p.y,(p.size||3)*a,0,Math.PI*2);cx.fillStyle=p.color+Math.floor(a*255).toString(16).padStart(2,'0');cx.fill();}
  });
  particles=particles.filter(p=>p.life>0);
}

function drawMilestone(){
  if(milestoneAnim>0){const a=milestoneAnim/60;cx.save();cx.globalAlpha=Math.min(1,a*3);cx.font=`500 ${22+10*(1-a)}px sans-serif`;cx.textAlign='center';cx.fillStyle=`rgba(255,220,80,${Math.min(1,a)})`;cx.fillText(milestoneText,W/2,60);cx.restore();milestoneAnim--;}
}

function drawHUD(){
  cx.font='500 13px sans-serif';cx.textAlign='left';cx.fillStyle='rgba(255,255,255,0.12)';cx.fillText('score '+score,14,44);
  const barW=Math.min(score*2,W-28);cx.fillStyle='rgba(255,255,255,0.05)';cx.fillRect(14,H-14,W-28,3);cx.fillStyle='rgba(93,202,165,0.4)';cx.fillRect(14,H-14,barW,3);
}

function drawGameOver(){
  cx.fillStyle='rgba(8,8,24,0.88)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';cx.font='500 32px sans-serif';cx.textAlign='center';cx.shadowColor='#E24B4A';cx.shadowBlur=20;cx.fillText('Game Over',W/2,H/2-30);cx.shadowBlur=0;
  cx.fillStyle='rgba(255,255,255,0.45)';cx.font='400 13px sans-serif';cx.fillText(score>=best&&score>0?'New Best! '+score:'Score '+score+' | Best '+best,W/2,H/2+5);
  const bg=cx.createLinearGradient(W/2-75,0,W/2+75,0);bg.addColorStop(0,'#1D9E75');bg.addColorStop(1,'#534AB7');
  cx.fillStyle=bg;cx.beginPath();cx.roundRect(W/2-75,H/2+30,150,42,10);cx.fill();
  cx.fillStyle='#fff';cx.font='500 16px sans-serif';cx.fillText('Try Again',W/2,H/2+57);
}

function collidesObs(o){
  const px=player.x,py=player.y,pr=PSIZE/2-3;
  if(px+pr>o.x&&px-pr<o.x+OW){if(py-pr<ceilY+o.topH)return true;if(py+pr>o.botY)return true;}
  return false;
}

function die(){
  if(state!=='play')return;
  state='dead';best=Math.max(best,score);document.getElementById('bs').textContent=best;
  shake(10);playDie();stopBG();
  for(let i=0;i<28;i++)particles.push({type:'dot',x:player.x,y:player.y,vx:(Math.random()-0.5)*9,vy:(Math.random()-0.5)*9,life:50,maxLife:50,color:i%2?'#E24B4A':'#EF9F27',size:4});
  particles.push({type:'ring',x:player.x,y:player.y,r:0,maxR:60,life:25,maxLife:25,color:'#E24B4A'});
}

function loop(){
  requestAnimationFrame(loop);
  if(state==='splash'){drawSplash();return;}
  let sx=0,sy=0;
  if(shakeTimer>0){shakeTimer--;sx=(Math.random()-0.5)*shakeAmt;sy=(Math.random()-0.5)*shakeAmt;}
  cx.save();cx.translate(sx,sy);drawBG();
  if(state==='dead'){drawParticles();drawGameOver();cx.restore();return;}
  frame++;flipCooldown=Math.max(0,flipCooldown-1);
  score=Math.floor(frame/60);speed=3.2+score*0.06;document.getElementById('sc').textContent=score;
  if(score>lastScore){if(lastScore>=0){playScore();if(score%10===0){milestoneText='🔥 '+score+' pts!';milestoneAnim=60;}}lastScore=score;}
  const grav=player.flipped?-player.grav:player.grav;
  player.vy+=grav;player.vy=Math.max(-10,Math.min(10,player.vy));player.y+=player.vy;
  if(player.y+PSIZE/2>=groundY){player.y=groundY-PSIZE/2;die();}
  if(player.y-PSIZE/2<=ceilY){player.y=ceilY+PSIZE/2;die();}
  spawnTimer++;const interval=Math.max(52,90-score*1.2);
  if(spawnTimer>=interval){spawnObs();spawnTimer=0;}
  obstacles.forEach(o=>{o.x-=speed;drawObs(o);if(!o.scored&&o.x+OW<player.x)o.scored=true;if(collidesObs(o))die();});
  obstacles=obstacles.filter(o=>o.x>-OW-10);
  drawParticles();drawPlayer();drawMilestone();drawHUD();
  cx.restore();
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flip();}});
cv.addEventListener('touchstart',e=>{e.preventDefault();flip();},{passive:false});
cv.addEventListener('mousedown',()=>flip());

initStars();loop();
</script>
</body>
</html>
